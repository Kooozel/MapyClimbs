name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Lint, Test & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── ESLint ──────────────────────────────────────────────────────────────
      - name: ESLint
        run: npm run lint

      # ── Vitest ─────────────────────────────────────────────────────────────
      - name: Test
        run: npm test

      # ── Build (required by web-ext lint) ───────────────────────────────────
      - name: Build
        run: npm run build

      # ── web-ext lint (validates manifest.json + extension structure) ────────
      - name: web-ext lint
        run: npm run lint:ext
