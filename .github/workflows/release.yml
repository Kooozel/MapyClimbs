name: Release

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    # Skip the version-bump commit that this workflow itself pushes back
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: read
    outputs:
      zip-name: ${{ steps.zip.outputs.name }}
      zip-path: ${{ steps.zip.outputs.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Build extension zip ───────────────────────────────────────────────
      - name: Build zip
        run: npm run zip

      - name: Find zip file
        id: zip
        run: |
          ZIP=$(find dist -name "*.zip" | head -1)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $ZIP)" >> "$GITHUB_OUTPUT"

      # ── Upload zip as artifact for the publish job ────────────────────────
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: ${{ steps.zip.outputs.path }}
          retention-days: 1

  publish:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: build
    environment: production   # <-- manual approval gate lives here
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: dist

      - name: Find zip file
        id: zip
        run: |
          ZIP=$(find dist -name "*.zip" | head -1)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"

      # ── Chrome Web Store publish ──────────────────────────────────────────
      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: ${{ steps.zip.outputs.path }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

      # ── Version bump + tag (only after successful CWS publish) ────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Bump version and tag
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$LAST_TAG" = "v$CURRENT" ]; then
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            git add package.json
            git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          else
            NEW_VERSION="$CURRENT"
          fi
          git tag "v$NEW_VERSION"
          git push origin HEAD:main --follow-tags
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.zip.outputs.path }}

      # ── Merge main back into develop ──────────────────────────────────────
      - name: Merge main into develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge main --no-ff -m "chore: merge main into develop after release v${{ steps.version.outputs.version }} [skip ci]"
          git push origin develop
