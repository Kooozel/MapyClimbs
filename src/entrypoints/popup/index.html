<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MapyClimbs</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="popup-container">

      <!-- ══ MAIN VIEW ══════════════════════════════════════════════════════ -->
      <div id="view-main">

        <header class="popup-header">
          <div class="header-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 17 9 11 13 15 21 7" />
              <polyline points="14 7 21 7 21 14" />
            </svg>
          </div>
          <div class="header-text">
            <h1>MapyClimbs</h1>
            <span class="version" id="ext-version"></span>
          </div>
          <button class="gear-btn" id="gear-btn" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </header>

        <section class="status-section">
          <div class="status-row" id="status-row">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text" data-i18n="popupStatusNone"
              >No GPX captured yet</span
            >
          </div>
          <div class="spinner" id="analysis-spinner" style="display: none">
            <div class="spinner-dot spinner-dot-1"></div>
            <div class="spinner-dot spinner-dot-2"></div>
            <div class="spinner-dot spinner-dot-3"></div>
          </div>
        </section>

        <section id="climb-stats" class="climb-stats" style="display: none">
          <p id="climb-stats-text"></p>
        </section>

        <section id="retry-section" style="display: none">
          <button id="retry-btn" class="retry-btn" data-i18n="popupRetryBtn">↻ Retry Analysis</button>
        </section>

        <section class="categories-section">
          <h2 data-i18n="popupCatTitle">Categories</h2>
          <div class="cat-list" id="cat-list"></div>
          <p class="formula" id="cat-formula"></p>
        </section>

        <footer class="popup-footer">
          <a
            class="bmc-btn"
            href="https://buymeacoffee.com/frantisek.sikula"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="popupBmcBtn"
          >
            ☕ Support this project
          </a>
        </footer>

      </div><!-- /view-main -->

      <!-- ══ SETTINGS VIEW ══════════════════════════════════════════════════ -->
      <div id="view-settings" style="display: none">

        <header class="settings-header">
          <button class="back-btn" id="back-btn" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <h1 data-i18n="popupSettingsPageTitle">Settings</h1>
        </header>

        <section class="settings-group">
          <h2 data-i18n="popupSettingsTitle">Scoring Model</h2>
          <div class="model-toggle" id="model-toggle">
            <button class="model-btn" id="model-btn-aso" data-model="aso" data-i18n="popupModelASO">ASO</button>
            <button class="model-btn" id="model-btn-garmin" data-model="garmin" data-i18n="popupModelGarmin">Garmin</button>
          </div>
          <p class="model-desc" id="model-desc"></p>
        </section>

        <section class="settings-group">
          <h2 data-i18n="popupMapLayerTitle">Map Layer</h2>
          <label class="toggle-row">
            <span class="toggle-label" data-i18n="popupMapLayerLabel">Show climb markers on map</span>
            <span class="toggle-switch">
              <input type="checkbox" id="map-layer-toggle" />
              <span class="toggle-thumb"></span>
            </span>
          </label>
        </section>

        <!-- TODO: time calculation model (e.g. W/kg input) -->

      </div><!-- /view-settings -->

    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
